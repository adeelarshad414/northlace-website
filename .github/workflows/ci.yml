name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  verify:
    name: Verify
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22.12.0
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Install brand generator dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libreoffice-impress poppler-utils
          python3 -m pip install reportlab

      - name: Generate brand kits
        run: npm run brand:build

      - name: Generate sales deck
        run: npm run deck:build

      - name: Lint
        run: npm run lint

      - name: Content lint
        run: npm run lint:content

      - name: Content marker report
        run: npm run report:content-markers

      - name: Secret scan
        run: npm run security:secrets

      - name: Dependency audit
        run: npm run security:audit

      - name: Check formatting
        run: npm run format:check

      - name: Typecheck
        run: npm run typecheck

      - name: Unit tests
        run: npm run test

      - name: Build
        run: npm run build

      - name: Production content lint
        run: npm run lint:production-content

      - name: End-to-end tests
        run: npm run test:e2e

      - name: Accessibility scan
        run: npm run test:a11y

      - name: Lighthouse CI
        run: npm run lhci

      - name: Brand Lighthouse CI
        run: npm run lhci:brand

      - name: Resource Lighthouse CI
        run: npm run lhci:resources
